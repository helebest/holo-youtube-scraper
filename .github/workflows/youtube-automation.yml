name: youtube-automation

'on':
  push:
    branches:
      - main
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Task selection mode: due / task / all"
        required: false
        default: "due"
      task_name:
        description: "Task name when run_mode=task"
        required: false
        default: "ai_tracker"
      run_date:
        description: "Optional logical run date (YYYY-MM-DD)"
        required: false
        default: ""
      dry_run:
        description: "Run task without pushing data branches (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: youtube-automation-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  run-automation:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      DEFAULT_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-groups --frozen

      - name: Validate API key
        shell: bash
        run: |
          if [[ -z "${YOUTUBE_API_KEY}" ]]; then
            echo "Missing required secret: YOUTUBE_API_KEY"
            exit 1
          fi

      - name: Select tasks
        id: select
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RUN_MODE="$(jq -r '.inputs.run_mode // "due"' "$GITHUB_EVENT_PATH")"
            TASK_NAME="$(jq -r '.inputs.task_name // "ai_tracker"' "$GITHUB_EVENT_PATH")"
          else
            RUN_MODE="all"
            TASK_NAME=""
          fi

          ARGS=(--config .github/youtube-tasks.yml --run-mode "$RUN_MODE")
          if [[ "$RUN_MODE" == "task" ]]; then
            if [[ -z "$TASK_NAME" ]]; then
              echo "run_mode=task requires task_name"
              exit 1
            fi
            ARGS+=(--task-name "$TASK_NAME")
          fi

          LIST_JSON="$(uv run python scripts/youtube_automation.py list "${ARGS[@]}")"

          TASKS_CSV="$(jq -er 'if .ok then (.tasks | join(",")) else error(.error.message // "list command failed") end' <<<"$LIST_JSON")"
          TASK_COUNT="$(jq -er '.tasks | length' <<<"$LIST_JSON")"

          echo "tasks_csv=${TASKS_CSV}" >> "$GITHUB_OUTPUT"
          echo "task_count=${TASK_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Configure git user
        if: steps.select.outputs.task_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run tasks and publish branches
        if: steps.select.outputs.task_count != '0'
        shell: bash
        env:
          TASKS_CSV_INPUT: ${{ steps.select.outputs.tasks_csv }}
        run: |
          set -euo pipefail

          TASKS_CSV="${TASKS_CSV_INPUT}"
          if [[ -z "$TASKS_CSV" ]]; then
            echo "No tasks selected."
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RUN_DATE="$(jq -r '.inputs.run_date // ""' "$GITHUB_EVENT_PATH")"
            DRY_RUN="$(jq -r '.inputs.dry_run // "false"' "$GITHUB_EVENT_PATH")"
          else
            RUN_DATE=""
            DRY_RUN="false"
          fi

          IFS=',' read -ra TASKS <<< "$TASKS_CSV"
          FAILED=0
          NOW_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          TEMP_OUTPUT_ROOT="${RUNNER_TEMP}/youtube-data"
          mkdir -p "$TEMP_OUTPUT_ROOT"

          for TASK in "${TASKS[@]}"; do
            echo "Executing task: ${TASK}"

            PLAN_ARGS=(--config .github/youtube-tasks.yml --task-name "$TASK" --output-root data --now-utc "$NOW_UTC")
            if [[ -n "$RUN_DATE" ]]; then
              PLAN_ARGS+=(--run-date "$RUN_DATE")
            fi

            if ! PLAN_JSON="$(uv run python scripts/youtube_automation.py plan "${PLAN_ARGS[@]}")"; then
              echo "Task planning failed: ${TASK}"
              FAILED=1
              continue
            fi

            BRANCH="$(jq -er '.result.branch' <<<"$PLAN_JSON")"
            RUN_DAY="$(jq -er '.result.date' <<<"$PLAN_JSON")"
            REPO_OUTPUT_DIR="$(jq -er '.result.output_dir' <<<"$PLAN_JSON")"

            TASK_OUTPUT_ROOT="${TEMP_OUTPUT_ROOT}/${TASK}"
            mkdir -p "$TASK_OUTPUT_ROOT"
            ARGS=(--config .github/youtube-tasks.yml --task-name "$TASK" --output-root "$TASK_OUTPUT_ROOT" --now-utc "$NOW_UTC")
            if [[ -n "$RUN_DATE" ]]; then
              ARGS+=(--run-date "$RUN_DATE")
            fi

            if ! RESULT_JSON="$(uv run python scripts/youtube_automation.py run "${ARGS[@]}")"; then
              echo "Task execution failed: ${TASK}"
              FAILED=1
              continue
            fi

            RESULT_BRANCH="$(jq -er '.result.branch' <<<"$RESULT_JSON")"
            OUTPUT_DIR="$(jq -er '.result.output_dir' <<<"$RESULT_JSON")"
            CHANNELS_OK="$(jq -er '.result.summary.channels_ok // 0' <<<"$RESULT_JSON")"
            CHANNELS_TOTAL="$(jq -er '.result.summary.channels_total // 0' <<<"$RESULT_JSON")"

            if [[ "$RESULT_BRANCH" != "$BRANCH" ]]; then
              echo "Planned branch and result branch mismatch for ${TASK}."
              FAILED=1
              continue
            fi

            if [[ "$CHANNELS_TOTAL" -gt 0 && "$CHANNELS_OK" -eq 0 ]]; then
              echo "Task ${TASK} has zero successful channels."
              FAILED=1
              continue
            fi

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "Dry-run: skipping push for ${TASK} -> ${BRANCH}"
              continue
            fi

            git fetch origin "$BRANCH" || true
            if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH}"; then
              git checkout -B "$BRANCH" "origin/$BRANCH"
            else
              git checkout -B "$BRANCH" "$DEFAULT_BRANCH"
            fi

            mkdir -p "$(dirname "$REPO_OUTPUT_DIR")"
            rm -rf "$REPO_OUTPUT_DIR"
            cp -R "$OUTPUT_DIR" "$REPO_OUTPUT_DIR"

            git add -f "$REPO_OUTPUT_DIR"
            if git diff --cached --quiet; then
              echo "No data change for ${TASK} on ${RUN_DAY}."
            else
              git commit -m "chore(data): ${TASK} ${RUN_DAY}"
              git push origin "$BRANCH"
            fi

            git checkout "$DEFAULT_BRANCH"
          done

          exit "$FAILED"
