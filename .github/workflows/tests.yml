name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-groups --frozen

      - name: Run tests with coverage gate
        run: uv run pytest

      - name: CLI smoke checks
        run: |
          uv run python -m youtube_scraper --help
          uv run python -m youtube_scraper popular --help
          uv run python -m youtube_scraper transcript --help
          uv run python -m youtube_scraper full --help
